name: GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'app/web/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          version: 11.5.1

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Build web
        working-directory: app/web
        run: pnpm install --frozen-lockfile && pnpm run build

      - name: Assemble site (showcase as index)
        run: |
          mkdir -p site
          cp -r app/web/dist/* site/
          mv site/showcase.html site/index.html

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v4
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
