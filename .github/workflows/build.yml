name: Application

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Test
        working-directory: app
        run: go test ./...

      - name: Build
        working-directory: app
        run: go build .

      - name: Build docker container
        uses: docker/build-push-action@v6
        with:
          context: ./app
          file: ./app/Dockerfile
          platforms: linux/amd64
          push: false
          tags: |
            pharndt/mqtt-homekit:latest
