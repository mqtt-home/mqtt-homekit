<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MQTT HomeKit</title>
  <style>
    :root { color-scheme: light dark; --bg:#0b0d10; --card:#16191e; --muted:#8b97a6; --fg:#e7ecf2; --accent:#4f9cff; --border:#262b33; }
    @media (prefers-color-scheme: light) { :root { --bg:#f4f6f9; --card:#fff; --muted:#5b6573; --fg:#11151a; --border:#e2e6ec; } }
    * { box-sizing: border-box; }
    body { margin:0; font:15px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; background:var(--bg); color:var(--fg); }
    header { padding:20px 24px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; gap:16px; flex-wrap:wrap; }
    h1 { font-size:18px; margin:0; }
    .pin { font-variant-numeric:tabular-nums; font-size:22px; font-weight:600; letter-spacing:1px; color:var(--accent); }
    .pin small { display:block; font-size:11px; color:var(--muted); font-weight:400; letter-spacing:0; }
    main { padding:24px; }
    .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(240px,1fr)); gap:14px; }
    .card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:14px 16px; }
    .name { font-weight:600; }
    .type { font-size:12px; color:var(--muted); text-transform:capitalize; margin-bottom:8px; }
    .kv { display:flex; justify-content:space-between; font-size:13px; padding:2px 0; }
    .kv span:first-child { color:var(--muted); text-transform:capitalize; }
    .empty { color:var(--muted); font-size:13px; }
    .dot { display:inline-block; width:8px; height:8px; border-radius:50%; background:#3ec46d; margin-right:6px; }
    .dot.bad { background:#e0564f; }
    .pair { display:flex; align-items:center; gap:14px; }
    .pair img { width:96px; height:96px; border-radius:8px; background:#fff; padding:4px; }
  </style>
</head>
<body>
  <header>
    <div><h1><span id="dot" class="dot"></span><span id="bridge">MQTT HomeKit</span></h1>
      <div class="empty" id="count"></div></div>
    <div class="pair">
      <img id="qr" alt="HomeKit pairing QR" src="/api/qr" />
      <div class="pin"><span id="pin">—</span><small>scan or enter to pair</small></div>
    </div>
  </header>
  <main><div class="grid" id="grid"></div></main>
  <script>
    // Cards are built once and updated in place so text selection survives the
    // 2s refresh (rebuilding innerHTML would clear any selection).
    const cards = {};
    const setText = (el, t) => { if (el.textContent !== t) el.textContent = t; };
    const fmt = v => typeof v === 'boolean' ? (v ? 'on' : 'off') : String(v);

    async function tick() {
      try {
        const info = await (await fetch('/api/info')).json();
        setText(document.getElementById('bridge'), info.bridge);
        setText(document.getElementById('pin'), info.pin);
        setText(document.getElementById('count'), info.accessories + ' accessories');
        const dot = document.getElementById('dot');
        const cls = 'dot' + (info.healthy ? '' : ' bad');
        if (dot.className !== cls) dot.className = cls;

        const devs = await (await fetch('/api/devices')).json();
        const grid = document.getElementById('grid');
        const seen = new Set();

        for (const d of devs) {
          const key = String(d.aid);
          seen.add(key);
          let c = cards[key];
          if (!c) {
            const root = document.createElement('div'); root.className = 'card';
            const name = document.createElement('div'); name.className = 'name'; name.textContent = d.name;
            const type = document.createElement('div'); type.className = 'type'; type.textContent = d.type;
            const body = document.createElement('div');
            root.append(name, type, body);
            grid.appendChild(root);
            c = cards[key] = { root, body, rows: {}, empty: null };
          }
          const state = d.state || {};
          const keys = Object.keys(state);
          if (keys.length === 0) {
            if (!c.empty) { c.empty = document.createElement('div'); c.empty.className = 'empty'; c.empty.textContent = 'waiting for data…'; c.body.appendChild(c.empty); }
          } else {
            if (c.empty) { c.empty.remove(); c.empty = null; }
            for (const k of keys) {
              let vv = c.rows[k];
              if (!vv) {
                const r = document.createElement('div'); r.className = 'kv';
                const kk = document.createElement('span'); kk.textContent = k.replace(/_/g, ' ');
                vv = document.createElement('span');
                r.append(kk, vv); c.body.appendChild(r);
                c.rows[k] = vv;
              }
              setText(vv, fmt(state[k]));
            }
            for (const k of Object.keys(c.rows)) {
              if (!(k in state)) { c.rows[k].parentElement.remove(); delete c.rows[k]; }
            }
          }
        }
        for (const key of Object.keys(cards)) {
          if (!seen.has(key)) { cards[key].root.remove(); delete cards[key]; }
        }
      } catch (e) { /* keep last state on transient errors */ }
    }
    tick(); setInterval(tick, 2000);
  </script>
</body>
</html>
